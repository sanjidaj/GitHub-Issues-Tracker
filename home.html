<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomePage</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;
        }
    </style>
</head>
<body class="max-w-full  bg-[#F8FAFC]">
    <header class="flex justify-between bg-white py-2 px-10 mb-10">
        <div class="flex items-center gap-2">
            <img src="assets/github-logo_25231.png" alt="">
            <h1 class="text-[24px] font-semibold">GitHub Issues Tracker</h1>
        </div>
        <div class="flex gap-4">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input id="search-input" type="search" required placeholder="Search Issues..." />
            </label>
            <div class="flex items-center">
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
            </div>
        
        </div>
    </header>
    <section class="max-w-5xl mx-auto space-y-4">
        <div class="flex gap-3 bg-white p-3">
            <button  id="all-btn" class="btn btn-primary px-8 py-1">All</button>
            <button  id="open-btn" class="btn px-8 py-1">Open</button>
            <button  id="closed-btn" class="btn px-8 py-1">Closed</button>
        </div>
        <div class="flex justify-between bg-white p-3">
            <div class="flex gap-2 items-center">
                <div>
                    <img class="bg-[#ECE4FF] rounded-full p-2" src="assets/Aperture.png" alt="">
                </div>
                <div>
                    <p class="font-semibold text-xl"><span id="total-count">0</span> Issues</p>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
               </div>
            </div>
            <div class="flex gap-2">
                <div class="flex items-center gap-2">
                    <span class=" w-3 h-3 bg-[#00A96E] rounded-full"></span>
                    <span>Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class=" w-3 h-3 bg-[#A855F7] rounded-full"></span>
                    <span>Closed</span>
                </div>
            </div>
        </div>
    </section>
    <div id="loading-spinner" class=" h-[55vh] hidden justify-center items-center ">
            <span class="loading loading-spinner loading-xl"></span>
    </div>
    <section id="card-section" class=" max-w-5xl mx-auto bg-[#E4E4E7] grid grid-cols-4 gap-2  p-4 ">
        <!-- All card -->
    </section>
    
    <dialog id="issue-details" class="modal">
                <div id="single-card">
                    <!-- single card -->
                </div>
    </dialog>
       
    <div id="search-section">

    </div>
   
    


    <script src="script.js"></script>
</body>
</html>
